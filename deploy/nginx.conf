# /etc/nginx/sites-available/archiosk.com
# Symlink into sites-enabled, then: nginx -t && systemctl reload nginx

upstream archiosk_app {
    # Passive health check: after 3 failed requests within 30s, nginx
    # marks this backend down for 30s and fails fast (502) instead of
    # hanging every request on it. There's only one backend here, so
    # this trades "always try anyway" for "fail fast during an outage" —
    # revert to fail_timeout=0 if you'd rather always attempt the request.
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    listen [::]:80;
    server_name archiosk.com www.archiosk.com;

    # Redirect all plain HTTP to HTTPS once certbot has issued certs.
    return 301 https://archiosk.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name archiosk.com www.archiosk.com;

    ssl_certificate     /etc/letsencrypt/live/archiosk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archiosk.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Keep in sync with MAX_UPLOAD_MB in .env — this is a static nginx
    # literal, not env-driven, so raising MAX_UPLOAD_MB without updating
    # this value means nginx will 413 uploads the app would otherwise
    # accept, well before Flask's own MAX_CONTENT_LENGTH check ever runs.
    client_max_body_size 25M;
    # A file near that limit can legitimately take a while to arrive over a
    # slow connection — give both legs of the upload the same headroom as
    # the classification response gets below, instead of nginx's 60s default.
    client_body_timeout 120s;

    access_log /var/log/nginx/archiosk.access.log;
    error_log  /var/log/nginx/archiosk.error.log;

    location /static/ {
        alias /var/www/archiosk/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fast, quiet path for external monitors (uptime checks, systemd
    # timers) — kept out of the access log and given tight timeouts so a
    # stuck backend is reported quickly rather than after the full
    # request timeout. Counts toward the upstream's passive max_fails.
    location = /health {
        access_log off;
        proxy_pass http://archiosk_app;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
    }

    location / {
        proxy_pass http://archiosk_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Keep in sync with GUNICORN_TIMEOUT in deploy/gunicorn.conf.py —
        # a large document's classify stage can legitimately take up to
        # ANTHROPIC_CLASSIFY_BUDGET_SECONDS, and nginx's 60s default would
        # otherwise cut the response off before Gunicorn does.
        proxy_read_timeout 120s;
        # Forwarding a large, slow upload to Gunicorn is the same
        # concern as client_body_timeout above, just on the upstream leg.
        proxy_send_timeout 120s;
    }
}
