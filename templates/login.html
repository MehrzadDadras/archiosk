{% extends "base.html" %}

{% block title %}Sign in &mdash; Archiosk{% endblock %}

{% block content %}
<section class="hero">
    <p class="eyebrow">Project Gateway</p>
    <h1>Sign in</h1>
    <p class="hero-copy">Sign in to ingest documents and view the dashboard.</p>
</section>

{% if error %}
<p class="mono form-error">{{ error }}</p>
{% endif %}

<form method="post" class="upload-form">
    <input type="text" name="username" class="text-input" placeholder="Username" required autofocus>
    <input type="password" name="password" class="text-input" placeholder="Password" required>
    <button type="submit" class="btn btn-primary">Sign in</button>
</form>
{% endblock %}
