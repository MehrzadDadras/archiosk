{% extends "base.html" %}

{% block title %}Ingest a document &mdash; Archiosk{% endblock %}

{% block content %}
<section class="hero">
    <p class="eyebrow">Step 1</p>
    <h1>Ingest an RFP or RFQ</h1>
    <p class="hero-copy">
        Accepted formats: PDF, DOCX, TXT, CSV. Maximum size {{ max_upload_mb }}MB.
    </p>
</section>

{% if error %}
<p class="mono form-error">{{ error }}</p>
{% endif %}

<form method="post" enctype="multipart/form-data" class="upload-form">
    <input type="file" name="file" required accept=".pdf,.docx,.txt,.csv">
    <div class="upload-form-optional">
        <input type="text" name="actor" class="text-input" placeholder="Your name (optional, for the audit trail)">
        <input type="text" name="role" class="text-input" placeholder="Your role (optional)">
    </div>
    <button type="submit" class="btn btn-primary">Parse document</button>
</form>
{% endblock %}
